name: CoreHub Audit Incident Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  audit-incident:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run audit incident check
        env:
          COREHUB_REGISTRY: https://coreblow.com/corehub
          COREHUB_TOKEN: ${{ secrets.COREHUB_AUDIT_TOKEN }}
          COREHUB_USER: github:coreblow-admin
          COREHUB_PUBLISHER: coreblow
          COREHUB_AUDIT_ALERT_DESTINATION: slack
          COREHUB_AUDIT_ALERT_WEBHOOK: ${{ secrets.COREHUB_AUDIT_ALERT_WEBHOOK }}
          COREHUB_AUDIT_ALERT_RETRIES: "2"
          COREHUB_AUDIT_ALERT_RETRY_DELAY_MS: "250"
          COREHUB_AUDIT_ALERT_TIMEOUT_MS: "5000"
          COREHUB_AUDIT_ALERT_DEAD_LETTER_PATH: ./corehub-audit-alert-dead-letter.json
          COREHUB_AUDIT_ALERT_METRICS_PATH: ./corehub-audit-alert-delivery-metrics.jsonl
        run: npm run audit:incident -- --output ./corehub-audit-incident.md --limit 50
      - name: Upload audit incident report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: corehub-audit-incident
          path: |
            ./corehub-audit-incident.md
            ./corehub-audit-alert-dead-letter.json
            ./corehub-audit-alert-delivery-metrics.jsonl
