# CoreHub API persistence bootstrap placeholder for Cloudflare Workers.
# The Worker entrypoint passes env.COREHUB_D1 into the D1 state-store bootstrap.

name = "corehub-api"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]
main = "src/worker.mjs"

[vars]
COREHUB_STATE_STORE = "d1"
COREHUB_D1_STATE_KEY = "write-side-state"
COREHUB_D1_STATE_TABLE = "corehub_state"
COREHUB_R2_BUCKET_NAME = "corehub-artifacts"
COREHUB_SIGNING_KEY_ID = "primary"
# Optional rotation placeholder. Put secret material in Wrangler secrets, not vars.
# COREHUB_SIGNING_PREVIOUS_SECRETS = "previous:key-material"
COREHUB_PUBLIC_BASE_URL = "https://coreblow.com/corehub"
COREHUB_AUDIT_RETENTION_DAYS = "365"
COREHUB_ADMIN_ACTORS = "github:coreblow-admin,moderator:corehub"
COREHUB_ANALYTICS_SALT = "replace-with-operator-managed-analytics-salt"
COREHUB_RATE_LIMIT_MAX = "120"
COREHUB_RATE_LIMIT_WINDOW_MS = "60000"

[[d1_databases]]
binding = "COREHUB_D1"
database_name = "corehub"
database_id = "replace-with-cloudflare-d1-database-id"

[[r2_buckets]]
binding = "COREHUB_R2"
bucket_name = "corehub-artifacts"

# Required before deploy:
# wrangler secret put COREHUB_SIGNING_SECRET --config ops/cloudflare/wrangler.corehub-api.persistence.example.toml
