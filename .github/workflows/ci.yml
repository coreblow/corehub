name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm test
      - run: npm run smoke:local-publish
      - run: npm run smoke:audit-alert-pipeline
      - run: npm run validate:ops
      - run: npm run validate:schema
      - run: npm run validate:write-schema
